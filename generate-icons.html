<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body style="font-family:sans-serif;padding:20px;background:#f5f5f5">
<h2>EduCenter — Icon Generator</h2>
<p>Tugmalarni bosing, PNG fayllar avtomatik yuklanadi:</p>

<div style="display:flex;gap:16px;flex-wrap:wrap;margin:24px 0">
  <div>
    <canvas id="c192" width="192" height="192" style="border-radius:40px;box-shadow:0 4px 16px rgba(0,0,0,0.15)"></canvas>
    <br><button onclick="download('c192','pwa-192.png')" style="margin-top:8px;padding:8px 16px;background:#6366f1;color:white;border:none;border-radius:8px;cursor:pointer">pwa-192.png yuklash</button>
  </div>
  <div>
    <canvas id="c512" width="512" height="512" style="width:192px;height:192px;border-radius:40px;box-shadow:0 4px 16px rgba(0,0,0,0.15)"></canvas>
    <br><button onclick="download('c512','pwa-512.png')" style="margin-top:8px;padding:8px 16px;background:#6366f1;color:white;border:none;border-radius:8px;cursor:pointer">pwa-512.png yuklash</button>
  </div>
  <div>
    <canvas id="c180" width="180" height="180" style="border-radius:40px;box-shadow:0 4px 16px rgba(0,0,0,0.15)"></canvas>
    <br><button onclick="download('c180','apple-touch-icon.png')" style="margin-top:8px;padding:8px 16px;background:#6366f1;color:white;border:none;border-radius:8px;cursor:pointer">apple-touch-icon.png yuklash</button>
  </div>
</div>

<button onclick="downloadAll()" style="padding:12px 28px;background:#3730a3;color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px">Hammasini yuklash</button>

<script>
const svgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <polygon points="256,128 404,208 256,288 108,208" fill="white"/>
  <path d="M 162 224 L 162 308 Q 162 362 256 372 Q 350 362 350 308 L 350 224 Q 303 252 256 252 Q 209 252 162 224 Z" fill="white" opacity="0.92"/>
  <rect x="396" y="208" width="10" height="96" rx="5" fill="white" opacity="0.85"/>
  <circle cx="401" cy="318" r="20" fill="white"/>
  <line x1="401" y1="322" x2="388" y2="352" stroke="rgba(99,102,241,0.5)" stroke-width="4" stroke-linecap="round"/>
  <line x1="401" y1="322" x2="401" y2="356" stroke="rgba(99,102,241,0.5)" stroke-width="4" stroke-linecap="round"/>
  <line x1="401" y1="322" x2="414" y2="352" stroke="rgba(99,102,241,0.5)" stroke-width="4" stroke-linecap="round"/>
</svg>`;

function drawToCanvas(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svgData], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function downloadAll() {
  setTimeout(() => download('c192', 'pwa-192.png'), 0);
  setTimeout(() => download('c512', 'pwa-512.png'), 300);
  setTimeout(() => download('c180', 'apple-touch-icon.png'), 600);
}

drawToCanvas('c192', 192);
drawToCanvas('c512', 512);
drawToCanvas('c180', 180);
</script>
</body>
</html>
